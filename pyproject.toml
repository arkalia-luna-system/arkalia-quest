[tool.poetry]
name = "arkalia-quest"
version = "3.0.0"
description = "Jeu éducatif hacker pour adolescents"
authors = ["Arkalia Quest Team <dev@arkalia-quest.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
Flask = "3.0.0"
Werkzeug = "3.0.1"
gunicorn = "21.2.0"
Flask-SocketIO = "5.3.6"
python-socketio = "5.9.0"
eventlet = "0.33.3"
python-dotenv = "1.0.0"
click = "8.1.7"
colorama = "0.4.6"
requests = "2.31.0"
cryptography = "41.0.7"
psutil = "5.9.6"
Pillow = "10.1.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api" 