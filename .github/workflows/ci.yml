name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_test:
    name: Lint and tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Check formatting
        run: |
          python -m pip install black==25.1.0 --quiet
          black --check core engines utils tests app.py

      - name: Lint
        run: ruff check core engines utils tests app.py

      - name: Run tests
        run: |
          python -m pytest tests/ -q --maxfail=1 --tb=short --cov=core --cov=engines --cov=utils --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10' && matrix.os == 'ubuntu-latest'
        run: |
          curl -fsSL https://uploader.codecov.io/latest/linux/codecov -o codecov
          chmod +x codecov
          ./codecov upload-process --file coverage.xml --flag unittests --name codecov-umbrella || true

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint_test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs: package
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test Docker image
        run: |
          docker build -t arkalia-quest:latest .
          chmod +x ./.github/scripts/test-docker.sh
          bash ./.github/scripts/test-docker.sh

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build docs
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
          mkdocs build

      - name: Deploy GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force --clean
