<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — LUNA</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/game.css">
  <style>
    /* Journal LUNA */
    .luna-journal {
      background: var(--bg-panel);
      border: 1px solid var(--border-luna);
      border-radius: var(--radius-md);
      padding: 1.2rem 1.4rem;
      width: 100%;
      box-sizing: border-box;
    }
    .luna-journal-header {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.9rem;
    }
    .luna-journal-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--luna); box-shadow: 0 0 6px var(--luna-glow);
      flex-shrink: 0;
    }
    .luna-journal-label {
      font-size: 0.72rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--luna); font-weight: 600;
    }
    .luna-journal-text {
      font-size: 0.88rem; color: var(--text-main); line-height: 1.75;
      font-style: italic; white-space: pre-wrap;
    }

    /* Moments clés */
    .moments-list {
      display: flex; flex-direction: column; gap: 0.5rem; width: 100%;
    }
    .moment-item {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem; color: var(--text-main); line-height: 1.5;
    }
    .moment-icon {
      color: var(--luna); opacity: 0.7; flex-shrink: 0; font-size: 0.75rem;
      margin-top: 2px;
    }
    .moments-empty {
      font-size: 0.82rem; color: var(--text-dim); font-style: italic;
      padding: 0.5rem 0;
    }

    .profil-endings { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
    .ending-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: border-color var(--speed-fast);
    }
    .ending-card.unlocked { border-color: var(--border-luna); }
    .ending-card.locked   { opacity: 0.45; }
    .ending-card-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
      border: 1px solid currentColor;
    }
    .ending-card.unlocked.ending_a .ending-card-icon { color: #00d4ff; background: rgba(0,212,255,0.1); }
    .ending-card.unlocked.ending_b .ending-card-icon { color: #8b5cf6; background: rgba(139,92,246,0.1); }
    .ending-card.unlocked.ending_c .ending-card-icon { color: #f97316; background: rgba(249,115,22,0.1); }
    .ending-card.unlocked.ending_d .ending-card-icon { color: #94a3b8; background: rgba(148,163,184,0.12); }
    .ending-card.locked .ending-card-icon { color: var(--text-dim); background: var(--bg-card); font-size: 1rem; }
    .ending-card-info { flex: 1; }
    .ending-card-title { font-size: 0.95rem; font-weight: 600; color: var(--text-white); }
    .ending-card-desc  { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .ending-card-badge {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 3px 10px;
      border-radius: var(--radius-full); border: 1px solid currentColor;
    }
    .ending-card.unlocked.ending_a .ending-card-badge { color: #00d4ff; border-color: #00d4ff; }
    .ending-card.unlocked.ending_b .ending-card-badge { color: #8b5cf6; border-color: #8b5cf6; }
    .ending-card.unlocked.ending_c .ending-card-badge { color: #f97316; border-color: #f97316; }
    .ending-card.unlocked.ending_d .ending-card-badge { color: #94a3b8; border-color: #94a3b8; }
    .ending-card.locked .ending-card-badge { color: var(--text-dim); }

    .chapters-timeline { display: flex; flex-direction: column; gap: 0; width: 100%; }
    .chapter-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .chapter-item:last-child { border-bottom: none; }
    .chapter-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--text-dim);
      background: transparent;
    }
    .chapter-dot.done { background: var(--luna); border-color: var(--luna); }
    .chapter-dot.current { background: var(--action); border-color: var(--action); box-shadow: 0 0 8px var(--action-glow); }
    .chapter-name { font-size: 0.88rem; color: var(--text-dim); }
    .chapter-name.done { color: var(--text-main); }
    .chapter-name.current { color: var(--action); }
    .chapter-check { margin-left: auto; font-size: 0.8rem; color: var(--luna); }

    .section-label {
      font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-dim); font-weight: 600; margin-bottom: 0.75rem;
    }
    .section-tease {
      font-size: 0.88rem; color: var(--luna); opacity: 0.9;
      margin: -0.4rem 0 0.8rem 0; font-style: italic;
    }
    .section-tease.section-complete {
      color: var(--success); font-style: normal; font-weight: 600;
      text-shadow: 0 0 12px rgba(52,211,153,0.4);
    }
    .profil-section { width: 100%; }

    /* Titre de hacker sur le profil */
    .profil-hacker-rank {
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      margin: 0.5rem 0 1rem;
      padding: 0.8rem 1.4rem;
      background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
      border: 1px solid var(--rank-color, var(--luna));
      border-radius: var(--radius-md);
      box-shadow: 0 0 16px -4px var(--rank-color, var(--luna-glow));
      width: 100%; box-sizing: border-box;
    }
    .profil-rank-label {
      font-size: 0.62rem; font-family: var(--font-mono);
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--rank-color, var(--luna)); opacity: 0.7;
    }
    .profil-rank-title {
      font-size: 1.25rem; font-weight: 700; font-family: var(--font-mono);
      color: var(--rank-color, var(--luna));
      text-shadow: 0 0 14px var(--rank-color, var(--luna-glow));
    }
    .profil-rank-desc {
      font-size: 0.76rem; color: var(--text-secondary); font-style: italic;
    }

    /* Niveau XP */
    .xp-level-bar {
      display: flex; align-items: center; gap: 0.75rem;
      width: 100%; box-sizing: border-box; margin: 0.3rem 0;
    }
    .xp-level-badge {
      font-size: 0.7rem; font-family: var(--font-mono); font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: var(--radius-full);
      border: 1px solid var(--level-color, var(--luna));
      color: var(--level-color, var(--luna));
      white-space: nowrap; flex-shrink: 0;
    }
    .xp-level-progress { flex: 1; height: 6px; background: var(--bg-card); border-radius: 3px; overflow: hidden; }
    .xp-level-fill { height: 100%; border-radius: 3px; background: var(--level-color, var(--luna)); transition: width 0.8s ease; }
    .xp-level-next { font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; }
    .secret-master-badge {
      margin-top: 0.4rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(245,158,11,0.5);
      color: #f59e0b;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      box-shadow: 0 0 12px rgba(245,158,11,0.25);
    }
    .secrets-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.55rem;
      width: 100%;
    }
    .secret-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 0.8rem;
      color: var(--text-main);
    }
    .secret-card.locked {
      opacity: 0.55;
    }
    .secret-card.unlocked {
      border-color: rgba(167,139,250,0.45);
      box-shadow: 0 0 10px rgba(167,139,250,0.18);
    }
    .secret-title {
      font-weight: 600;
      color: var(--text-white);
    }
    .secret-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .secret-state {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a78bfa;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="page-profil">
  <div class="home-bg-grid" aria-hidden="true"></div>

  <header class="simple-header">
    <a href="/" class="nav-back" aria-label="Accueil">←</a>
    <h1 class="page-title">Ton profil</h1>
    <a href="/game" class="btn-outline" style="padding:6px 14px;font-size:0.82rem;">Jouer →</a>
  </header>

  <main class="profil-main">
    <div id="profil-content" class="profil-content">
      <p class="loading-text">Chargement...</p>
    </div>
  </main>

  <script src="/static/js/hacker-ranks.js"></script>
  <script>
    // Niveaux XP
    const XP_LEVELS = [
      { min: 0,    max: 99,   label: "Recrue",        color: "#94a3b8" },
      { min: 100,  max: 249,  label: "Opérateur",     color: "#60a5fa" },
      { min: 250,  max: 499,  label: "Agent",         color: "#3dd2f5" },
      { min: 500,  max: 749,  label: "Hacker",       color: "#a78bfa" },
      { min: 750,  max: 999,  label: "Hacker Élite", color: "#f97316" },
      { min: 1000, max: 9999, label: "Fantôme",       color: "#f43f5e" },
    ];

    function getXpLevel(xp) {
      return XP_LEVELS.find(l => xp >= l.min && xp <= l.max) || XP_LEVELS[XP_LEVELS.length - 1];
    }

    function getHackerRank(trust, endings, flags) {
      const endingId = endings.includes("ending_a")
        ? "ending_a"
        : endings.includes("ending_b")
          ? "ending_b"
          : endings.includes("ending_c")
            ? "ending_c"
            : endings.includes("ending_d")
              ? "ending_d"
              : null;
      if (typeof window.getHackerRankShared === "function") {
        return window.getHackerRankShared({ trust, flags, endingId });
      }
      return { title: "Operateur", desc: "Tu as gere. C'est ce qui compte.", color: "#94a3b8" };
    }

    const CHAPTER_NAMES = {
      "chapitre_0": "Signal",
      "chapitre_1": "Le Fichier",
      "chapitre_2": "La Corp",
      "chapitre_3": "NEXUS",
      "chapitre_4": "Ce qu'Althea a envoyé",
      "chapitre_5": "Althea",
      "chapitre_6": "Le Choix",
    };
    const CHAPTER_ORDER = Object.keys(CHAPTER_NAMES);

    const ENDINGS = [
      { id: "ending_a", label: "FIN A", title: "La Fusion",    icon: "◉", desc: "LUNA et NEXUS survivent. Althea est libre. Tu as cru en elle jusqu'au bout." },
      { id: "ending_b", label: "FIN B", title: "Le Sacrifice", icon: "◈", desc: "NEXUS a refusé. Vous avez trouvé un autre chemin, à deux." },
      { id: "ending_c", label: "FIN C", title: "PANDORA",      icon: "◇", desc: "Tout est révélé. LUNA s'est fragmentée — libre, autrement." },
      { id: "ending_d", label: "FIN D", title: "Signal Fantome", icon: "⬡", desc: "Vous coupez toute trace. LUNA devient introuvable." },
    ];
    const SECRET_META = [
      { id: "ghost-entry", title: "Entree fantome", hint: "Au final, cherche un 3e chemin." },
      { id: "perfect-trust", title: "Confiance max", hint: "Monte la confiance tres haut." },
      { id: "double-agent", title: "Double jeu", hint: "Ecoute deux camps opposes." },
      { id: "pandora-scout", title: "PANDORA complete", hint: "Inspecte puis tranche." },
      { id: "nexus-gambit", title: "Pari NEXUS", hint: "Teste NEXUS puis pivote." },
    ];

    async function loadProfil() {
      const [stateRes, summaryRes, journalRes] = await Promise.all([
        fetch('/api/story/state'),
        fetch('/api/story/summary'),
        fetch('/api/story/journal'),
      ]);
      const state   = await stateRes.json();
      const summary = await summaryRes.json();
      const journal = await journalRes.json();
      const container = document.getElementById('profil-content');

      if (!state.success) {
        container.innerHTML = '<p class="error-text">Erreur de chargement.</p>';
        return;
      }

      const trust    = state.luna_trust ?? 50;
      const xp       = state.xp ?? 0;
      const progress = state.chapter_progress ?? 0;
      const completed = summary.chapters_completed ?? 0;
      const endings   = summary.endings_unlocked ?? [];
      const flags     = summary.flags ?? [];
      const currentCh = state.chapter_id ?? "chapitre_0";
      const secrets = summary.secrets_found ?? [];
      const secretsTotal = summary.secrets_total ?? 5;
      const secretsCount = Array.isArray(secrets) ? secrets.length : 0;
      const isSecretMaster = secretsCount >= secretsTotal;
      const journalText = journal.success ? (journal.journal || "") : "";
      const moments     = journal.success ? (journal.moments || []) : [];
      const playerName  = journal.player_name || "";

      // Texte de statut confiance
      let trustStatus, trustColor;
      if (trust >= 75)      { trustStatus = "Profonde"; trustColor = "var(--success)"; }
      else if (trust >= 50) { trustStatus = "Établie";  trustColor = "var(--luna)"; }
      else if (trust >= 25) { trustStatus = "Fragile";  trustColor = "var(--text-dim)"; }
      else                  { trustStatus = "Brisée";   trustColor = "var(--danger)"; }

      // Niveau XP
      const level    = getXpLevel(xp);
      const nextLevel = XP_LEVELS[XP_LEVELS.indexOf(level) + 1];
      const xpProgress = nextLevel
        ? Math.round(((xp - level.min) / (nextLevel.min - level.min)) * 100)
        : 100;

      // Titre de hacker
      const rank = getHackerRank(trust, endings, flags);

      container.innerHTML = `
        <!-- Card principale -->
        <div class="profil-card" style="margin-bottom:1.5rem;">
          <div class="profil-luna-avatar">
            <div class="avatar-ring"></div>
            <div class="avatar-core">
              <span class="avatar-eye left"></span>
              <span class="avatar-eye right"></span>
            </div>
          </div>
          <h2 class="profil-name">${playerName ? playerName : "Ton lien avec LUNA"}</h2>

          ${rank ? `
          <div class="profil-hacker-rank" style="--rank-color:${rank.color}">
            <span class="profil-rank-label">Titre obtenu</span>
            <span class="profil-rank-title">${escapeHtml(rank.title)}</span>
            <span class="profil-rank-desc">${escapeHtml(rank.desc)}</span>
          </div>` : ''}

          <div class="xp-level-bar" style="--level-color:${level.color}">
            <span class="xp-level-badge">${escapeHtml(level.label)}</span>
            <div class="xp-level-progress">
              <div class="xp-level-fill" style="width:${xpProgress}%"></div>
            </div>
            <span class="xp-level-next">${nextLevel ? `${xp} / ${nextLevel.min} XP` : `${xp} XP`}</span>
          </div>

          <div class="profil-stat">
            <span class="stat-label">Ta confiance</span>
            <div class="trust-bar" style="flex:1">
              <div class="trust-fill" style="width:${trust}%"></div>
            </div>
            <span class="stat-value" style="color:${trustColor}">${trust}% — ${trustStatus}</span>
          </div>
          <div class="profil-stats-grid">
            <div class="stat-item">
              <span class="stat-number">${xp}</span>
              <span class="stat-desc">Ton XP</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">${completed} <span style="font-size:0.9rem;color:var(--text-dim)">/ 7</span></span>
              <span class="stat-desc">Chapitres</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">${endings.length} <span style="font-size:0.9rem;color:var(--text-dim)">/ 4</span></span>
              <span class="stat-desc">Fins</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" style="font-size:1rem;color:var(--luna)">${CHAPTER_NAMES[currentCh] || "?"}</span>
              <span class="stat-desc">Où t'en es</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">${secretsCount} <span style="font-size:0.9rem;color:var(--text-dim)">/ ${secretsTotal}</span></span>
              <span class="stat-desc">Secrets</span>
            </div>
          </div>
          ${isSecretMaster ? '<span class="secret-master-badge">✦ Secret Master</span>' : ''}
        </div>

        <!-- Journal LUNA -->
        ${journalText ? `
        <div class="profil-section" style="margin-bottom:1.5rem;">
          <p class="section-label">Journal LUNA</p>
          <div class="luna-journal">
            <div class="luna-journal-header">
              <div class="luna-journal-dot"></div>
              <span class="luna-journal-label">Message de LUNA</span>
            </div>
            <p class="luna-journal-text">${escapeHtml(journalText)}</p>
          </div>
        </div>
        ` : ''}

        <!-- Moments clés -->
        ${moments.length > 0 ? `
        <div class="profil-section" style="margin-bottom:1.5rem;">
          <p class="section-label">Moments clés</p>
          <div class="moments-list">
            ${moments.map(m => `
              <div class="moment-item">
                <span class="moment-icon">◈</span>
                <span>${escapeHtml(m.label)}</span>
              </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- Fins -->
        <div class="profil-section" style="margin-bottom:1.5rem;">
          <p class="section-label">Fins</p>
          ${endings.length < 4 ? `<p class="section-tease">${endings.length === 0 ? "4 fins à découvrir. Tu n'as encore rien vu." : endings.length === 1 ? "Encore 3 à débloquer." : endings.length === 2 ? "Encore 2 à débloquer." : "Une dernière fin."}</p>` : `<p class="section-tease section-complete">✦ Parcours complet. T'es un vrai.</p>`}
          <div class="profil-endings">
            ${ENDINGS.map(e => {
              const unlocked = endings.includes(e.id);
              return `
                <div class="ending-card ${unlocked ? 'unlocked' : 'locked'} ${e.id}">
                  <div class="ending-card-icon">${unlocked ? e.icon : '?'}</div>
                  <div class="ending-card-info">
                    <div class="ending-card-title">${unlocked ? e.title : '???'}</div>
                    <div class="ending-card-desc">${unlocked ? e.desc : 'À débloquer'}</div>
                  </div>
                  <span class="ending-card-badge">${unlocked ? e.label : '—'}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div class="profil-section" style="margin-bottom:1.5rem;">
          <p class="section-label">Secrets détectés</p>
          ${secretsCount < secretsTotal
            ? `<p class="section-tease">Progression: ${secretsCount}/${secretsTotal}. Continue d'explorer les chemins cachés.</p>`
            : `<p class="section-tease section-complete">✦ Tous les secrets ont été détectés.</p>`}
          <div class="luna-journal">
            <p class="luna-journal-text">Progression meta: ${secretsCount}/${secretsTotal}${isSecretMaster ? " — grade Secret Master actif." : ""}</p>
          </div>
          <div class="secrets-grid" style="margin-top:0.7rem;">
            ${SECRET_META.map(secret => {
              const unlocked = secrets.includes(secret.id);
              return `
                <div class="secret-card ${unlocked ? "unlocked" : "locked"}">
                  <div>
                    <div class="secret-title">${unlocked ? escapeHtml(secret.title) : "Secret verrouille"}</div>
                    <div class="secret-hint">${unlocked ? "Detecte sur ta sauvegarde" : escapeHtml(secret.hint)}</div>
                  </div>
                  <span class="secret-state">${unlocked ? "ON" : "LOCK"}</span>
                </div>
              `;
            }).join("")}
          </div>
        </div>

        <!-- Progression chapitres -->
        <div class="profil-section" style="margin-bottom:1.5rem;">
          <p class="section-label">Progression</p>
          <div class="chapters-timeline">
            ${CHAPTER_ORDER.map((chId, idx) => {
              const isDone    = idx < completed;
              const isCurrent = chId === currentCh && !isDone;
              const cls = isDone ? 'done' : isCurrent ? 'current' : '';
              return `
                <div class="chapter-item">
                  <div class="chapter-dot ${cls}"></div>
                  <span class="chapter-name ${cls}">Chap. ${idx} — ${CHAPTER_NAMES[chId]}</span>
                  ${isDone ? '<span class="chapter-check">✓</span>' : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <!-- Actions -->
        <div class="profil-actions">
          <a href="/game" class="btn-primary">Continuer l'histoire</a>
          <button onclick="resetStory()" class="btn-outline btn-danger">Recommencer</button>
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function resetStory() {
      if (!confirm('Tout effacer. Recommencer. Tu es sûr ?')) return;
      await fetch('/api/story/reset', { method: 'POST' });
      window.location.href = '/game';
    }

    loadProfil();
  </script>
</body>
</html>
