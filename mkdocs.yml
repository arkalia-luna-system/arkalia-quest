# MkDocs Configuration for Arkalia Quest
site_name: Arkalia Quest Documentation
site_description: Documentation du jeu narratif LUNA Hors Connexion
site_author: Arkalia Luna System
site_url: https://arkalia-luna-system.github.io/arkalia-quest/

# Repository
repo_name: arkalia-luna-system/arkalia-quest
repo_url: https://github.com/arkalia-luna-system/arkalia-quest

# Configuration
theme:
  name: material
  palette:
    - scheme: dark
      primary: green
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: light
      primary: green
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

# Navigation
nav:
  - Accueil: index.md
  - Vision: VISION.md
  - Architecture: ARCHITECTURE.md
  - Roadmap: ROADMAP.md
  - Déploiement: DEPLOYMENT_GUIDE.md
  - Contribution: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
  - Release Checklist v3.1.1: RELEASE_CHECKLIST_v3.1.1.md
  - Assets Demo: assets/README.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arkalia-luna-system
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/arkalia-quest
  version:
    provider: mike

# Documentation source directory
docs_dir: docs
exclude_docs: |
  ._*

# Copyright
copyright: Copyright &copy; 2026 Arkalia Luna System
