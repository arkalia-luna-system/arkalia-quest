<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classement — LUNA</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/game.css">
  <style>
    .leaderboard-table {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 40px 1fr auto auto auto;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      animation: fade-in var(--speed-norm) ease-out both;
      transition: border-color var(--speed-fast);
    }

    .lb-row:hover { border-color: var(--border-luna); }

    .lb-row.lb-me {
      border-color: var(--border-action);
      background: rgba(61, 214, 245, 0.04);
    }

    .lb-row.lb-top-1 { border-color: rgba(255,215,0,0.4); }
    .lb-row.lb-top-2 { border-color: rgba(192,192,192,0.4); }
    .lb-row.lb-top-3 { border-color: rgba(205,127,50,0.4); }

    .lb-rank {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dim);
      text-align: center;
    }
    .lb-rank.rank-1 { color: gold; }
    .lb-rank.rank-2 { color: silver; }
    .lb-rank.rank-3 { color: #cd7f32; }

    .lb-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-name.is-me { color: var(--action); }

    .lb-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .lb-chapters {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .lb-xp {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--luna);
      white-space: nowrap;
      min-width: 64px;
      text-align: right;
    }

    .lb-endings {
      display: flex;
      gap: 4px;
    }

    .lb-ending-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .lb-ending-dot.ending_a { background: var(--success); }
    .lb-ending-dot.ending_b { background: var(--luna); }
    .lb-ending-dot.ending_c { background: var(--action); }

    .lb-header-row {
      display: grid;
      grid-template-columns: 40px 1fr auto auto auto;
      gap: 1rem;
      padding: 0 1.2rem 0.5rem;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .lb-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .lb-name-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
      overflow: hidden;
    }
    .lb-level-badge {
      font-size: 0.58rem;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 7px;
      border-radius: var(--radius-full);
      border: 1px solid currentColor;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .lb-you-badge {
      font-size: 0.6rem;
      background: var(--action-dim);
      color: var(--action);
      border: 1px solid var(--border-action);
      border-radius: var(--radius-full);
      padding: 1px 6px;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-left: 6px;
      text-transform: uppercase;
    }

    .lb-stats-bar {
      display: flex;
      gap: 1.5rem;
      padding: 1rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .lb-stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .lb-stat-val {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-white);
    }
    .lb-stat-lbl {
      font-size: 0.68rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body class="page-profil">
  <div class="home-bg-grid" aria-hidden="true"></div>

  <header class="simple-header">
    <a href="/" class="nav-back" aria-label="Accueil">←</a>
    <h1 class="page-title">Classement</h1>
    <a href="/game" class="btn-outline" style="padding:6px 14px;font-size:0.82rem;">Jouer →</a>
  </header>

  <main class="profil-main">
    <div class="profil-content" id="lb-content">
      <p class="loading-text" style="text-align:center;padding:3rem">Chargement...</p>
    </div>
  </main>

  <script>
    const ENDING_IDS = ["ending_a", "ending_b", "ending_c"];
    const ENDING_LABELS = { ending_a: "FIN A", ending_b: "FIN B", ending_c: "FIN C" };

    const XP_LEVELS = [
      { min: 0,    max: 99,   label: "Recrue",        color: "#94a3b8" },
      { min: 100,  max: 249,  label: "Opérateur",     color: "#60a5fa" },
      { min: 250,  max: 499,  label: "Agent",         color: "#3dd2f5" },
      { min: 500,  max: 749,  label: "Hackeur",       color: "#a78bfa" },
      { min: 750,  max: 999,  label: "Hackeur Élite", color: "#f97316" },
      { min: 1000, max: 9999, label: "Fantôme",       color: "#f43f5e" },
    ];
    function getXpLevel(xp) {
      return XP_LEVELS.find(l => xp >= l.min && xp <= l.max) || XP_LEVELS[XP_LEVELS.length - 1];
    }

    async function loadLeaderboard() {
      const container = document.getElementById("lb-content");

      // Charger classement + état joueur courant en parallèle
      const [lbRes, meRes] = await Promise.allSettled([
        fetch("/api/story/leaderboard").then(r => r.json()),
        fetch("/api/story/summary").then(r => r.json()),
      ]);

      const lb     = lbRes.status === "fulfilled" && lbRes.value.success ? lbRes.value.scores : [];
      const me     = meRes.status === "fulfilled" && meRes.value.success ? meRes.value : null;
      const myName = me?.player_name || null;
      const myXp   = me?.xp ?? 0;

      if (lb.length === 0) {
        container.innerHTML = `
          <div class="lb-empty">
            <p>Aucun joueur avec de la progression pour l'instant.</p>
            <p style="margin-top:0.5rem;font-size:0.82rem;">Commence l'histoire pour apparaître ici.</p>
            <a href="/game" class="btn-primary" style="margin-top:1.5rem;display:inline-flex;">
              Jouer maintenant
            </a>
          </div>
        `;
        return;
      }

      // Stats globales
      const totalXp    = lb.reduce((s, e) => s + e.xp, 0);
      const totalFinA  = lb.filter(e => (e.endings_unlocked || []).includes("ending_a")).length;
      const avgTrust   = Math.round(lb.reduce((s, e) => s + e.luna_trust, 0) / lb.length);

      container.innerHTML = `
        <!-- Stats globales -->
        <div class="lb-stats-bar">
          <div class="lb-stat-item">
            <span class="lb-stat-val">${lb.length}</span>
            <span class="lb-stat-lbl">Joueurs actifs</span>
          </div>
          <div class="lb-stat-item">
            <span class="lb-stat-val">${totalXp.toLocaleString("fr")}</span>
            <span class="lb-stat-lbl">XP total</span>
          </div>
          <div class="lb-stat-item">
            <span class="lb-stat-val">${totalFinA}</span>
            <span class="lb-stat-lbl">Fin A débloquée</span>
          </div>
          <div class="lb-stat-item">
            <span class="lb-stat-val">${avgTrust}%</span>
            <span class="lb-stat-lbl">Confiance</span>
          </div>
        </div>

        <!-- En-tête colonnes -->
        <div class="lb-header-row">
          <span>#</span>
          <span>Joueur</span>
          <span>Fins</span>
          <span>Chap.</span>
          <span style="text-align:right">XP</span>
        </div>

        <!-- Lignes classement -->
        <div class="leaderboard-table" id="lb-rows"></div>
      `;

      const rowsEl = document.getElementById("lb-rows");
      lb.forEach((entry, idx) => {
        const rank    = idx + 1;
        const isMe    = myName && entry.name.startsWith(myName.slice(0,3));
        const rankCls = rank <= 3 ? `rank-${rank}` : "";
        const rowCls  = [
          rank === 1 ? "lb-top-1" : rank === 2 ? "lb-top-2" : rank === 3 ? "lb-top-3" : "",
          isMe ? "lb-me" : "",
        ].filter(Boolean).join(" ");

        const rankEmoji = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;

        const endingDots = ENDING_IDS.map(id => {
          const unlocked = (entry.endings_unlocked || []).includes(id);
          return `<div class="lb-ending-dot ${unlocked ? id : ''}" title="${unlocked ? ENDING_LABELS[id] : '?'}"></div>`;
        }).join("");

        const level = getXpLevel(entry.xp);
        const levelBadge = `<span class="lb-level-badge" style="color:${level.color};border-color:${level.color}">${level.label}</span>`;

        const row = document.createElement("div");
        row.className = `lb-row ${rowCls}`;
        row.style.animationDelay = `${idx * 40}ms`;
        row.innerHTML = `
          <span class="lb-rank ${rankCls}">${rankEmoji}</span>
          <div class="lb-name-cell">
            <span class="lb-name ${isMe ? 'is-me' : ''}">${escapeHtml(entry.name)}${isMe ? '<span class="lb-you-badge">Toi</span>' : ''}</span>
            ${levelBadge}
          </div>
          <div class="lb-endings">${endingDots}</div>
          <span class="lb-chapters">${entry.chapters_done}/7</span>
          <span class="lb-xp">${entry.xp.toLocaleString("fr")} XP</span>
        `;
        rowsEl.appendChild(row);
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    loadLeaderboard();
  </script>
</body>
</html>
