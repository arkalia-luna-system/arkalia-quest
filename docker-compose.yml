services:
  arkalia-quest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkalia-quest
    ports:
      - "5001:10000"
    environment:
      - APP_ENV=production
      - FLASK_ENV=production
      - PORT=10000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
