[tool.poetry]
name = "arkalia-quest"
version = "3.0.0"
description = "Jeu éducatif hacker pour adolescents"
authors = ["Arkalia Quest Team <dev@arkalia-quest.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.8.1,<4.0"
Flask = "3.0.0"
Werkzeug = "3.0.1"
gunicorn = "21.2.0"
pytest = "7.4.3"
pytest-cov = "4.1.0"
pytest-mock = "3.12.0"
pytest-html = "4.1.1"
coverage = "7.3.2"
black = "23.11.0"
flake8 = "6.1.0"
mypy = "1.7.1"
Pillow = "10.1.0"
python-dotenv = "1.0.0"
click = "8.1.7"
colorama = "0.4.6"
requests = "2.31.0"
cryptography = "41.0.7"
psutil = "5.9.6"
Sphinx = "7.2.6"
sphinx-rtd-theme = "1.3.0"
pre-commit = "3.5.0"
Flask-SocketIO = "5.3.6"
python-socketio = "5.9.0"
eventlet = "0.33.3"
numpy = "1.24.3"
scikit-learn = "1.3.0"
joblib = "1.3.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api" 