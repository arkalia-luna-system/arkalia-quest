<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNA — Hors Connexion</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/css/game.css">
  <style>
    .home-save-info {
      font-size: 0.78rem;
      color: var(--text-dim);
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .home-save-info.visible { display: flex; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .home-nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .home-secondary-nav {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .home-secondary-nav a {
      font-size: 0.78rem;
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: color var(--speed-fast), background var(--speed-fast);
    }
    .home-secondary-nav a:hover {
      color: var(--text-main);
      background: var(--bg-card);
      text-decoration: none;
    }
    .btn-continue {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: transparent;
      color: var(--action);
      font-weight: 700;
      font-size: 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-action);
      text-decoration: none;
      transition: background var(--speed-fast), box-shadow var(--speed-fast);
    }
    .btn-continue:hover {
      background: var(--action-dim);
      box-shadow: 0 0 20px var(--action-glow);
      text-decoration: none;
      color: var(--action);
    }
  </style>
</head>
<body class="page-home">

  <main class="home-container">

    <!-- Signal -->
    <div class="home-signal">
      <span class="signal-dot"></span>
      <span class="signal-text">Signal entrant</span>
    </div>

    <!-- Avatar -->
    <div class="home-luna-avatar" aria-hidden="true">
      <div class="avatar-ring"></div>
      <div class="avatar-core">
        <span class="avatar-eye left"></span>
        <span class="avatar-eye right"></span>
      </div>
    </div>

    <!-- Texte -->
    <div class="home-content">
      <p class="home-sender">LUNA</p>
      <h1 class="home-title">Hors Connexion</h1>
      <p class="home-message" id="home-message">
        Tu reçois un message à 3h du matin.<br>
        Une IA piégée dit qu'elle t'a choisi.<br>
        Tu ne sais pas encore si tu peux lui faire confiance.
      </p>
    </div>

    <!-- Sauvegarde trouvée -->
    <div class="home-save-info" id="save-info">
      <span class="save-dot"></span>
      <span id="save-text">Sauvegarde trouvée</span>
    </div>

    <!-- Actions -->
    <div class="home-actions">
      <div class="home-nav" id="home-nav">
        <!-- Injecté dynamiquement selon la sauvegarde -->
        <a href="/game" class="btn-primary" id="cta-start">
          <span class="btn-icon">▶</span>
          Répondre au signal
        </a>
      </div>
      <div class="home-secondary-nav" id="secondary-nav" style="display:none;">
        <a href="/profil">Profil</a>
        <span style="color:var(--border)">·</span>
        <a href="/leaderboard">Classement</a>
      </div>
      <p class="home-meta">8 chapitres &nbsp;·&nbsp; 3 fins &nbsp;·&nbsp; Tes choix comptent vraiment</p>
    </div>

  </main>

  <script>
    async function checkSave() {
      try {
        const res  = await fetch('/api/story/summary');
        const data = await res.json();

        if (!data.success || !data.exists || data.chapters_completed === 0) return;

        // Une sauvegarde existe avec de la progression
        const { chapters_completed, luna_trust, endings_unlocked = [] } = data;

        const CHAPTER_NAMES = [
          "Signal","Le Fichier","La Corp","NEXUS",
          "Ce qu'Althea a envoyé","Althea","Le Choix"
        ];
        const chapterName = CHAPTER_NAMES[chapters_completed] || "Le Choix";

        // Mettre à jour le message
        document.getElementById('home-message').innerHTML =
          `LUNA t'attend.<br>Tu en es au chapitre <strong style="color:var(--luna)">${chapters_completed}</strong> — <em>${chapterName}</em>.<br>Confiance : ${luna_trust}%`;

        // Afficher l'info de sauvegarde
        const saveInfo = document.getElementById('save-info');
        document.getElementById('save-text').textContent =
          `Sauvegarde — ${chapters_completed} chap. complété${chapters_completed > 1 ? 's' : ''} · ${endings_unlocked.length} fin${endings_unlocked.length !== 1 ? 's' : ''}`;
        saveInfo.classList.add('visible');

        // Remplacer le CTA par "Continuer" + "Recommencer"
        document.getElementById('home-nav').innerHTML = `
          <a href="/game" class="btn-continue">
            <span>↩</span> Continuer l'histoire
          </a>
          <a href="/game" class="btn-primary" id="cta-start"
             onclick="return confirmRestart(event)">
            <span class="btn-icon">▶</span> Recommencer
          </a>
        `;

        // Afficher nav secondaire
        document.getElementById('secondary-nav').style.display = 'flex';

      } catch (e) {
        // Silencieux — accueil fonctionne sans API
      }
    }

    async function confirmRestart(e) {
      e.preventDefault();
      if (!confirm('Recommencer depuis le début ? Ta progression actuelle sera perdue.')) return false;
      await fetch('/api/story/reset', { method: 'POST' });
      window.location.href = '/game';
    }

    checkSave();
  </script>
</body>
</html>
