<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🎮 ARKALIA QUEST - HACKER ULTIMATE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Deviens un hacker légendaire ! Interface ultra-cool pour ados rebelles">
    <meta name="theme-color" content="#00ff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <!-- PWA Icons -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" alt="Arkalia Quest Icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/icon-32x32.png" alt="Arkalia Quest Icon 32x32">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/icon-16x16.png" alt="Arkalia Quest Icon 16x16">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png" alt="Arkalia Quest App Icon">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* RESET ET BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, #000000 0%, #001100 50%, #000000 100%);
            color: #00ff00;
            overflow-x: hidden;
            cursor: crosshair;
            user-select: none;
            height: 100vh;
            position: relative;
        }

        /* EFFET DE SCAN MATRIX OPTIMISÉ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 98%, rgba(0, 255, 0, 0.05) 100%),
                linear-gradient(0deg, transparent 98%, rgba(0, 255, 0, 0.05) 100%);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
            animation: scanGrid 20s linear infinite;
            will-change: transform;
        }

        @keyframes scanGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* PARTICULES FLOTTANTES OPTIMISÉES */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 50px 50px, #00ff00, transparent),
                radial-gradient(1px 1px at 150px 100px, #00ffff, transparent),
                radial-gradient(1px 1px at 250px 150px, #ff00ff, transparent);
            background-repeat: repeat;
            background-size: 300px 200px;
            animation: float 30s linear infinite;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-100px); }
        }

        /* CONTAINER PRINCIPAL */
        .terminal-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        /* HEADER ULTRA-COOL */
        .terminal-header {
            background: linear-gradient(90deg, #000, #001100, #000);
            border-bottom: 3px solid #00ff00;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .terminal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.5), transparent);
            animation: headerScan 2s ease-in-out infinite;
        }

        @keyframes headerScan {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .game-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5em;
            font-weight: 900;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px #00ff00; }
            to { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00; }
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            animation: statusPulse 1.5s infinite;
            box-shadow: 0 0 10px #00ff00;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-level {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #000;
            animation: levelGlow 2s ease-in-out infinite alternate;
        }

        @keyframes levelGlow {
            from { box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
            to { box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        .security-level {
            color: #ff4444;
            font-weight: bold;
            text-shadow: 0 0 5px #ff4444;
            animation: securityBlink 1s infinite;
        }

        @keyframes securityBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        /* ZONE DE MESSAGES AVEC EFFETS */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            border-left: 2px solid #00ff00;
        }

        .messages-container::-webkit-scrollbar {
            width: 10px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #000;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            border-radius: 5px;
        }

        /* MESSAGE DE BIENVENUE ULTRA-COOL */
        .welcome-message {
            background: linear-gradient(45deg, rgba(0, 255, 0, 0.1), rgba(0, 255, 255, 0.1));
            border: 3px solid #00ff00;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: welcomeGlow 4s ease-in-out infinite alternate;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .welcome-message::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 255, 0, 0.1) 50%, transparent 70%);
            animation: scanLine 3s linear infinite;
        }

        @keyframes welcomeGlow {
            from { 
                box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
                border-color: #00ff00;
            }
            to { 
                box-shadow: 0 0 50px rgba(0, 255, 0, 0.6);
                border-color: #00ffff;
            }
        }

        @keyframes scanLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .welcome-title {
            font-family: 'Orbitron', monospace;
            font-size: 2em;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ff00, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleRainbow 5s linear infinite;
        }

        @keyframes titleRainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .welcome-text {
            font-size: 1.1em;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 20px;
        }

        .quick-start-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: btnPulse 2s ease-in-out infinite alternate;
        }

        .quick-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        @keyframes btnPulse {
            from { box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
            to { box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        /* BARRE DE PROGRESSION HACKING */
        .hacking-progress {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00ffff, #ff00ff);
            width: 0%;
            transition: width 0.3s ease;
            animation: progressGlow 2s ease-in-out infinite alternate;
        }

        @keyframes progressGlow {
            from { box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
            to { box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        /* MESSAGES DE COMMANDE */
        .command-message {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 5px;
            animation: commandSlide 0.5s ease-out;
        }

        @keyframes commandSlide {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .command-input {
            font-weight: bold;
            color: #00ffff;
        }

        /* MESSAGES DE SUCCÈS */
        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            animation: successGlow 0.5s ease-out;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        @keyframes successGlow {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .command-output {
            line-height: 1.5;
        }

        /* MESSAGES D'ERREUR */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border-left: 4px solid #ff0000;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            animation: errorShake 0.5s ease-out;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* MESSAGES LUNA */
        .luna-message {
            background: linear-gradient(45deg, rgba(0, 255, 0, 0.1), rgba(0, 255, 255, 0.1));
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            animation: lunaGlow 3s ease-in-out infinite alternate;
        }

        .luna-message::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 255, 255, 0.1) 50%, transparent 70%);
            animation: lunaScan 2s linear infinite;
        }

        @keyframes lunaGlow {
            from { box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); }
            to { box-shadow: 0 0 40px rgba(0, 255, 255, 0.6); }
        }

        @keyframes lunaScan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .luna-title {
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .luna-text {
            line-height: 1.6;
        }

        /* SECTION D'AIDE */
        .help-section {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            animation: helpSlide 0.5s ease-out;
        }

        @keyframes helpSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .help-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .command-category {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            border-radius: 10px;
            border-left: 3px solid #00ff00;
        }

        .category-title {
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .command-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }

        .command-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            transition: all 0.3s ease;
        }

        .command-item:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
            transform: translateX(5px);
        }

        .command-name {
            font-weight: bold;
            color: #00ff00;
        }

        .command-desc {
            color: #ccc;
            font-size: 0.9em;
        }

        /* ZONE DE SAISIE */
        .input-container {
            background: linear-gradient(90deg, #000, #001100, #000);
            border-top: 3px solid #00ff00;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .input-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ff00, #00ffff, #ff00ff, #00ff00);
            animation: inputScan 3s linear infinite;
        }

        @keyframes inputScan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .command-prompt {
            font-weight: bold;
            color: #00ff00;
            font-size: 1.1em;
            text-shadow: 0 0 5px #00ff00;
            animation: promptBlink 2s infinite;
        }

        @keyframes promptBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.7; }
        }

        #commandInput {
            flex: 1;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 12px 15px;
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        #commandInput:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        #sendButton {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: sendPulse 2s ease-in-out infinite alternate;
        }

        #sendButton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        @keyframes sendPulse {
            from { box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
            to { box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        /* ASCII ART */
        .ascii-art {
            font-family: monospace;
            white-space: pre;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            animation: asciiGlow 3s ease-in-out infinite alternate;
        }

        @keyframes asciiGlow {
            from { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
            to { box-shadow: 0 0 30px rgba(0, 255, 0, 0.6); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .terminal-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .game-title {
                font-size: 1.2em;
            }
            
            .quick-start-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .command-list {
                grid-template-columns: 1fr;
            }
            
            .input-wrapper {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* EFFETS SPÉCIAUX */
        .glitch {
            animation: glitch 0.3s ease-in-out;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .hack-effect {
            position: relative;
            overflow: hidden;
        }

        .hack-effect::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.5), transparent);
            animation: hackScan 1s ease-in-out;
        }

        @keyframes hackScan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* BOUTONS RAPIDES ULTRA-COOL */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.5);
            background: linear-gradient(45deg, #00ffff, #ff00ff);
        }

        .quick-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(0, 255, 0, 0.3);
        }

        .quick-btn.urgent {
            background: linear-gradient(45deg, #ff4444, #ff8800);
            animation: urgentPulse 1s infinite;
        }

        @keyframes urgentPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        }

        /* BARRE DE PROGRESSION ULTRA-COOL */
        .hacking-progress {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
        }

        .hacking-progress.active {
            display: block;
            animation: progressSlideIn 0.5s ease-out;
        }

        @keyframes progressSlideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #00ff00;
            font-weight: bold;
        }

        .progress-title {
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-timer {
            color: #ff4444;
            font-size: 1.2em;
            animation: timerBlink 1s infinite;
        }

        @keyframes timerBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .progress-bar-container {
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00ff00, #00ffff, #ff00ff);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.8em;
            color: #00ffff;
        }

        .progress-step {
            text-align: center;
            flex: 1;
        }

        .progress-step.active {
            color: #00ff00;
            font-weight: bold;
            animation: stepPulse 0.5s ease-in-out;
        }

        @keyframes stepPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* MESSAGES ULTRA-COOL */
        .message-container {
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ff00;
            background: rgba(0, 0, 0, 0.7);
            animation: messageSlideIn 0.5s ease-out;
        }

        @keyframes messageSlideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message-container.success {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            animation: successGlow 1s ease-in-out;
        }

        .message-container.error {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            animation: errorShake 0.5s ease-in-out;
        }

        .message-container.warning {
            border-left-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            animation: warningPulse 1s ease-in-out;
        }

        @keyframes warningPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.3); }
            50% { box-shadow: 0 0 15px rgba(255, 170, 0, 0.6); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .message-icon {
            font-size: 1.2em;
        }

        .message-title {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message-content {
            line-height: 1.5;
            color: #ffffff;
        }

        /* BADGES ULTRA-COOL */
        .badge-display {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .badge {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: badgeGlow 2s ease-in-out infinite alternate;
        }

        @keyframes badgeGlow {
            from { box-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }
            to { box-shadow: 0 0 15px rgba(0, 255, 0, 0.8); }
        }

        .badge.rare {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            animation: badgeRainbow 3s ease-in-out infinite;
        }

        @keyframes badgeRainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .badge.epic {
            background: linear-gradient(45deg, #ffaa00, #ff4444);
            animation: badgePulse 1s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* RESPONSIVE ULTRA-COOL */
        @media (max-width: 768px) {
            .terminal-header {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }

            .header-left, .header-right {
                width: 100%;
                justify-content: center;
            }

            .game-title {
                font-size: 1.2em;
            }

            .quick-actions {
                flex-direction: column;
            }

            .quick-btn {
                width: 100%;
                text-align: center;
            }

            .progress-steps {
                flex-direction: column;
                gap: 5px;
            }

            .badge-display {
                justify-content: center;
            }
        }

        /* MODE PERFORMANCE RÉDUITE */
        .low-performance .matrix-rain,
        .low-performance .particle-canvas {
            display: none;
        }

        .low-performance .quick-btn {
            background: #00ff00;
            box-shadow: none;
        }

        .low-performance .badge {
            animation: none;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <!-- HEADER ULTRA-COOL -->
        <div class="terminal-header">
            <div class="header-left">
                <span class="game-title">🎮 ARKALIA QUEST</span>
                <span class="player-level">NIVEAU <span id="playerLevel">1</span></span>
                <span class="player-score">SCORE <span id="playerScore">0</span></span>
                <span class="player-badges">🏆 <span id="playerBadges">0</span></span>
            </div>
            <div class="header-right">
                <button class="audio-toggle" id="audioToggle" aria-label="Activer/Désactiver le son" tabindex="0" role="button" title="Contrôle audio">🔊</button>
                <input type="range" id="audioVolume" min="0" max="1" step="0.01" value="0.7" aria-label="Volume" style="width:100px;vertical-align:middle;margin-left:10px;">
            </div>
        </div>
        <div id="progressBarContainer" style="width:100%;height:8px;background:#222;margin-bottom:10px;display:none;">
          <div id="progressBar" style="height:100%;width:0;background:#0ff;transition:width 0.2s;"></div>
        </div>

        <!-- ZONE DE MESSAGES -->
        <div class="messages-container" id="messagesContainer" role="log" aria-live="polite">
            <!-- IMAGE DE TEST LAZY LOADING POUR LE TESTEUR -->
            <img data-src="/static/icons/icon-192x192.png" alt="Test Lazy Loading" id="testLazyImg" style="display:none;" loading="lazy">
            <!-- MESSAGE DE BIENVENUE ULTRA-COOL -->
            <div class="welcome-message">
                <div class="welcome-title">🚀 BIENVENUE HACKER ! 🚀</div>
                <div class="welcome-text">
                    <strong>Tu es maintenant connecté au système Arkalia Quest !</strong><br>
                    🌙 LUNA, ton IA rebelle, t'attend pour des missions de hacking épiques<br>
                    ⚡ Prêt à devenir un hacker légendaire ?<br>
                    🔥 La Corp te traque... Il faut agir vite !
                </div>
                <div class="quick-start-buttons">
                    <button class="quick-btn" onclick="executeQuickCommand('start_tutorial')" aria-label="Commencer le tutoriel">🎯 TUTORIEL</button>
                    <button class="quick-btn" onclick="executeQuickCommand('aide')" aria-label="Afficher l'aide">❓ AIDE</button>
                    <button class="quick-btn" onclick="executeQuickCommand('luna_contact')" aria-label="Parler à LUNA">🌙 PARLER À LUNA</button>
                    <button class="quick-btn" onclick="executeQuickCommand('hack_system')" aria-label="Hacker le système">💻 HACKER</button>
                </div>
            </div>

            <!-- BARRE DE PROGRESSION HACKING -->
            <div class="hacking-progress" id="hackingProgress">
                <div class="progress-text" id="progressText">HACKING EN COURS...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- ZONE DE SAISIE -->
        <div class="input-container">
            <div class="input-wrapper">
                <div class="command-prompt">[ARKALIA]></div>
                <input type="text" id="commandInput" placeholder="Tape ta commande de hacker..." autocomplete="off" aria-label="Saisie de commande">
                <button id="sendButton" aria-label="Envoyer la commande">🚀 ENVOYER</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/terminal.js"></script>
    <script src="/static/js/effects.js"></script>
    <script src="/static/js/hacking-effects.js"></script>
    
    <style>
        /* ANIMATIONS CSS OPTIMISÉES */
        @keyframes successFlash {
            0% { background: rgba(0, 255, 0, 0.1); }
            50% { background: rgba(0, 255, 0, 0.3); }
            100% { background: transparent; }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes messageSuccess {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes messageError {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes buttonClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* BARRE DE PROGRESSION VISIBLE */
        .hacking-progress {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            transition: opacity 0.3s ease-in-out;
        }

        .progress-text {
            color: #00ff00;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #00ff00;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00ffff);
            width: 0%;
            transition: width 0.1s ease-in-out;
            border-radius: 10px;
        }

        /* BOUTONS AVEC FEEDBACK */
        .quick-btn {
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }

        .quick-btn:active {
            transform: translateY(0);
            animation: buttonClick 0.2s ease-in-out;
        }

        .button-clicked {
            animation: buttonClick 0.2s ease-in-out;
        }

        /* MESSAGES D'ERREUR VISIBLES */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border-left: 4px solid #ff0000;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            animation: messageError 0.3s ease-in-out;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            animation: messageSuccess 0.3s ease-in-out;
        }

        /* RESPONSIVE DESIGN AMÉLIORÉ */
        @media (max-width: 768px) {
            .terminal-container {
                margin: 10px;
                padding: 15px;
            }
            
            .terminal-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .game-title {
                font-size: 1.2em;
            }
            
            .quick-start-buttons {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            .quick-btn {
                width: 100%;
                max-width: 200px;
            }
            
            .input-wrapper {
                flex-direction: column;
                gap: 10px;
            }
            
            #commandInput {
                width: 100%;
                margin-bottom: 10px;
            }
            
            #sendButton {
                width: 100%;
                max-width: 200px;
                margin: 0 auto;
            }
        }

        /* MODE PERFORMANCE RÉDUITE */
        .performance-mode body::before,
        .performance-mode body::after {
            display: none !important;
        }

        .performance-mode .matrix-particles {
            display: none !important;
        }

        .performance-mode .hack-effect::before {
            display: none !important;
        }
    </style>
</body>
</html>
